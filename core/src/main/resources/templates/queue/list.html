<!DOCTYPE html>
<html>
<head th:replace="~{fragments/header :: header (datatables = true, checkbox = true, diff = true)}" />
<style>
	#diffOutput { width: 100%; }
	#diffOutput .jsondiffpatch-delta { width: 100%; min-width: 100%; }
	#diffModalBody { padding: 0; }
	#diffModalBody .jsondiffpatch-delta { max-height: 70vh; overflow-y: auto; padding: 15px; }
</style>
<body class="top-navigation">
<div id="wrapper">
	<div id="page-wrapper" class="gray-bg">
		<div th:replace="~{fragments/topbar :: topbar (page = 'queue.list')}" />

		<div class="wrapper wrapper-content">
			<div class="row">

				<div class="col-lg-12">
					<div class="ibox">
						<div class="ibox-title">
							<h5><em class="fa fa-clock-o"></em> &nbsp; <span th:text="#{html.navbar.queue}"></span></h5>
						</div>

						<div class="ibox-content">
							<form id="selectClientForm" class="form-horizontal">
								<div class="form-group row">
									<label class="col-sm-1 col-form-label" th:text="#{html.page.queue.list.select.view}" />
									<div class="col-sm-2">
										<select id="viewMode" class="form-control m-b">
											<option value="pending" th:text="#{html.page.queue.list.view.pending}"></option>
											<option value="all" th:text="#{html.page.queue.list.view.all}"></option>
										</select>
									</div>
								</div>
								<div id="clientFilterRow" class="form-group row">
									<label class="col-sm-1 col-form-label" th:text="#{html.page.queue.list.select.client.label}" />
									<div class="col-sm-2">
										<select id="client" class="form-control m-b">
											<option value="0" th:text="#{html.page.queue.list.select.client}"></option>
											<option th:each="client : ${clients}" th:value="${client.id}" th:text="${client.name}"></option>
										</select>
									</div>
								</div>
							</form>
							<hr/>
							<div class="table-responsive">
								<table id="listTable" class="table table-striped table-hover listTable">
									<thead>
									<tr>
										<th class="col-md-1" th:text="#{html.entity.modificationhistory.tts}" />
										<th class="col-md-2" th:text="#{html.entity.modificationhistory.institutionName}" />
										<th class="col-md-1" th:text="#{html.entity.modificationhistory.entityType}" />
										<th class="col-md-2" th:text="#{html.entity.modificationhistory.entityName}" />
										<th class="col-md-1" th:text="#{html.entity.modificationhistory.uniId}" />
										<th class="col-md-1" th:text="#{html.entity.modificationhistory.username}" />
										<th class="col-md-1" th:text="#{html.entity.modificationhistory.entityRole}" />
										<th class="col-md-1" th:text="#{html.entity.modificationhistory.eventType}" />
										<th class="col-md-1" th:text="#{html.entity.modificationhistory.groups}" />
										<th class="col-md-1"></th>
									</tr>
									</thead>

									<tbody>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>

			</div>
		</div>

	</div>
</div>

<!-- Diff Modal -->
<div class="modal fade" id="diffModal" tabindex="-1" role="dialog">
	<div class="modal-dialog modal-xl" role="document">
		<div class="modal-content">
			<div class="modal-header">
				<h4 class="modal-title" id="diffModalTitle"></h4>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close">
					<span aria-hidden="true">&times;</span>
				</button>
			</div>
			<div class="modal-body" id="diffModalBody">
				<div id="diffOutput"></div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{html.control.button.close}"></button>
			</div>
		</div>
	</div>
</div>

<div th:replace="~{fragments/footer :: scripts (datatables = true, checkbox = true, diff = true)}" />

<script th:inline="javascript">
	/*<![CDATA[*/

    /*[+

    var ajaxUrl = [[@{/rest/modificationhistory/list}]];
    var diffUrl = [[@{/rest/modificationhistory/diff}]];

    var searchTxt = [[#{html.datatables.search}]];
    var dropdownTxt = [[#{html.datatables.dropdown}]];
    var infoDefaultTxt = [[#{html.datatables.info.default}]];
    var infoEmptyTxt = [[#{html.datatables.info.empty}]];
    var infoFilteredTxt = [[#{html.datatables.info.filtered}]];
    var prevTxt = [[#{html.datatables.prev}]];
    var nextTxt = [[#{html.datatables.next}]];

    var groups = [[${groups}]];

    var entityTypeLabels = [[${entityTypeLabels}]];
	var eventTypeLabels = [[${eventTypeLabels}]];

    +]*/

    var token = $("meta[name='_csrf']").attr("content");
    var defaultOrder = [0, 'desc'];

    var modificationHistoryService;
    $(document).ready(function() {
        modificationHistoryService = new ModificationHistoryService();
        modificationHistoryService.initializeDatatable(0);

        document.getElementById('viewMode').addEventListener('change', function() {
            localStorage.setItem('modificationHistoryViewMode', this.value);
    		var isPending = this.value === 'pending';
            document.getElementById('clientFilterRow').style.display = isPending ? '' : 'none';

            if (isPending) {
                var clientId = document.getElementById('client').value;
                modificationHistoryService.initializeDatatable(clientId);
            } else {
                modificationHistoryService.initializeDatatableAll();
            }
        });

        document.getElementById('client').addEventListener('change', function() {
            modificationHistoryService.initializeDatatable(this.value);
        });

        var savedViewMode = localStorage.getItem('modificationHistoryViewMode');
		if (savedViewMode) {
			document.getElementById('viewMode').value = savedViewMode;
			if (savedViewMode === 'all') {
				document.getElementById('clientFilterRow').style.display = 'none';
				modificationHistoryService.initializeDatatableAll();
			}
		}
    });

    function showDiff(entityId, entityType, entityTypeMessage, rev, entityName) {
    	$('#diffModalTitle').text('Ændringsdetaljer: ' + entityName + ' (' + (entityTypeLabels[entityType] || entityType) + ')');
		$('#diffOutput').html('<p style="padding: 15px;"><em class="fa fa-spinner fa-spin"></em> Henter ændringer...</p>');
		$('#diffModal').modal('show');

        $.ajax({
            url: diffUrl + '/' + entityId + '/' + entityType + '/' + rev,
            headers: { 'X-CSRF-TOKEN': token },
            type: 'GET',
            success: function(data) {
                try {
                    var left = JSON.parse(data.left);
                    var right = JSON.parse(data.right);
                    var delta = jsondiffpatch.diff(left, right);

                    if (delta) {
                        var html = jsondiffpatch.formatters.html.format(delta, left);
                        $('#diffOutput').html(html);
                    } else {
                        $('#diffOutput').html('<p style="padding: 15px;">Ingen ændringer fundet.</p>');
                    }
                } catch (e) {
                    $('#diffOutput').html('<p style="padding: 15px;">Fejl ved visning af ændringer.</p>');
                }
            },
            error: function() {
                $('#diffOutput').html('<p style="padding: 15px;">Kunne ikke hente ændringer.</p>');
            }
        });
    }

    function ModificationHistoryService() {

        this.initializeDatatable = function(clientId) {
            this._initTable(ajaxUrl + '/' + clientId);
        }

        this.initializeDatatableAll = function() {
            this._initTable(ajaxUrl + '/all');
        }

        this._initTable = function(url) {
            table = $('.listTable').DataTable({
                destroy: true,
                'ajax': {
                    'contentType': 'application/json',
                    'url': url,
                    'type': 'POST',
                    headers: {
                        'X-CSRF-TOKEN': token
                    },
                    'data': function(d) {
                        return JSON.stringify(d);
                    }
                },
                'serverSide' : true,
                columns : [{
                    data : 'tts'
                }, {
                    data : 'institutionName'
                }, {
					data : 'entityType',
					render: function (data) {
						return entityTypeLabels[data] || data;
					}
				}, {
					data : 'entityName'
				}, {
					data : 'uniId',
					render: function (data) {
						return data || '';
					}
				}, {
					data : 'username',
					render: function (data) {
						return data || '';
					}
				}, {
					data : 'entityRole',
					render: function (data) {
						return data || '';
					}
				}, {
					data : 'eventType',
					render: function (data) {
						return eventTypeLabels[data] || data;
					}
				}, {
                    data : 'groups',
                    render: function (data, type, row, meta) {
                        if (data != null && data != '') {
                            var result = '<ul style="list-style-type:none; padding: 0px; margin: 0px;">';
                            for (let i = 0; i < data.length; i++) {
                                result += '<li>' + data[i] + '</li>';
                            }
                            result += '</ul>';
                            return result;
                        }
                        return '';
                    }
                }, {
                    data : 'id',
                    orderable: false,
                    searchable: false,
                    render: function (data, type, row, meta) {
                        if (row.eventType === 'UPDATE' && row.rev) {
                            return '<button class="btn btn-xs btn-info" onclick="showDiff(' + row.entityId + ', \'' + row.entityType + '\', \'' + row.entityTypeMessage + '\', ' + row.rev + ', \'' + row.entityName.replace(/'/g, "\\'") + '\')">' +
								'<em class="fa fa-fw fa-exchange"></em></button>';
                        }
                        return '';
                    }
                }],
                'paging':    true,
                'ordering':  true,
                'order': [defaultOrder],
                'stateSave': false,
                'info':      true,
                'pageLength': 25,
                'language': {
                    "search":       searchTxt,
                    "lengthMenu":   dropdownTxt,
                    "info":         infoDefaultTxt,
                    "zeroRecords":  infoEmptyTxt,
                    "infoEmpty":    "",
                    "infoFiltered": infoFilteredTxt,
                    "paginate": {
                        "next": nextTxt,
                        "previous": prevTxt
                    }
                }
            });

            // Configure searching
            $.each($('.input-filter', table.table().footer()), function() {
                var column = table.column($(this).index());

                $('input', this).val('');
                $('input', this).on('keyup change', function () {
                    if (column.search() !== this.value) {
                        column.search(this.value).draw();
                    }
                });
            });

            // clear search
            table.columns().search("");
        }

    }
    /*]]>*/
</script>
</body>
</html>
